<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#131E35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="200" cy="180" rx="180" ry="140" fill="rgba(79,142,247,0.18)"/>
  <!-- Icon mark: stylised checkmark inside a rounded square -->
  <rect x="140" y="148" width="232" height="216" rx="28" fill="none" stroke="url(#accent)" stroke-width="22"/>
  <!-- Three task lines -->
  <line x1="186" y1="210" x2="326" y2="210" stroke="rgba(255,255,255,0.25)" stroke-width="16" stroke-linecap="round"/>
  <line x1="186" y1="256" x2="326" y2="256" stroke="rgba(255,255,255,0.25)" stroke-width="16" stroke-linecap="round"/>
  <line x1="186" y1="302" x2="280" y2="302" stroke="rgba(255,255,255,0.25)" stroke-width="16" stroke-linecap="round"/>
  <!-- Bold checkmark -->
  <polyline points="184,254 226,298 328,186" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
